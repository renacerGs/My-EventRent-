            async function fetchEvents(category = 'All') {
                try {
                    const response = await fetch(`/api/events?category=${category}`);
                    const events = await response.json();
                    renderEvents(events);
                } catch (error) {
                    console.error('Gagal mengambil data:', error);
                    eventGrid.innerHTML = '<p class="text-red-500">Gagal memuat event.</p>';
